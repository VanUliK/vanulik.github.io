<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Чемпионат Мира 2026: Прогнозы</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <header class="header">
      <h1>Чемпионат Мира 2026: Прогнозы</h1>
    </header>
    
    <!-- Таблица денег (долги/баланс) -->
    <h3>Финансовый расчёт (долги)</h3>
    <div id="money-container"></div> 
    <h3>Турнирная таблица (очки)</h3>
    <div id="scores-container"></div>
    
    <div class="predictions-table-wrapper">
      <table id="predictions-table">
        <!-- Содержимое генерируется JS -->
      </table>
      <!-- ЕДИНСТВЕННЫЙ контейнер для всех всплывающих сообщений -->
      <div id="cellTooltip" class="cell-tooltip"></div>
    </div>
    
  </div>
  
  <script src="script.js"></script>
</body>

</html>

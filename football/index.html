<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Чемпионат Мира 2026: Прогнозы</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <header class="header">
      <h1>Чемпионат Мира 2026: Прогнозы</h1>
    </header>

    <!-- ФИНАЛЬНАЯ ТАБЛИЦА -->
    <h3 class="section-title"><span class="icon">🏆</span> Итоговый баланс</h3>
    <div id="final-results"></div>

    <!-- ТАБЛИЦА ПРОГНОЗОВ -->
    <h3 class="section-title"><span class="icon">📋</span> Таблица прогнозов</h3>
    <div class="predictions-table-wrapper">
      <table id="predictions-table">
        <!-- Содержимое генерируется JS -->
      </table>
      <div id="cellTooltip" class="cell-tooltip"></div>
    </div>

    <!-- ФИНАНСЫ -->
    <h3 class="section-title"><span class="icon">💰</span> Финансы: кто сколько заработал</h3>
    <div id="money-container"></div>

    <!-- ТУРНИРНАЯ ТАБЛИЦА -->
    <h3 class="section-title"><span class="icon">📊</span> Турнирная таблица (очки)</h3>
    <div id="scores-container"></div>

  </div>

  <script src="script.js"></script>
</body>

</html>

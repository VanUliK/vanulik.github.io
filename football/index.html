<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Чемпионат Мира 2026: Прогнозы</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="/football/favicon.ico">
  <!-- PWA -->
  <link rel="manifest" href="/football/manifest.json">
  <meta name="theme-color" content="#1a2a6c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Прогнозы ЧМ-2026">
  <link rel="apple-touch-icon" href="/football/icons/icon-192x192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Прогнозы ЧМ-2026">
  <link rel="apple-touch-icon" href="/football/icons/icon-192x192.png">
  
  <!-- Иконки для разных iPhone -->
  <link rel="apple-touch-icon" sizes="152x152" href="/football/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/football/icons/icon-167x167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/football/icons/icon-180x180.png">
</head>

<body>
  
  <div class="container">
    <header class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 24px;">
      <h1 style="margin: 0;">⚽ Чемпионат Мира 2026: Прогнозы</h1>
      
      <!-- Кнопка входа / информация о пользователе -->
      <div>
        <button id="login-btn" onclick="showLoginModal()" style="
          background: #1a2a6c;
          color: #ffd900;
          border: 2px solid #ffd900;
          padding: 8px 20px;
          border-radius: 8px;
          font-weight: 700;
          font-size: 14px;
          cursor: pointer;
          transition: all 0.2s;
        ">
          🔑 Войти
        </button>
        
        <div id="user-info" style="display: none; align-items: center; gap: 12px;">
          <span style="color: #ffd900; font-weight: 600;">👤 <span id="user-name-display"></span></span>
          <button onclick="logout()" style="
            background: #f44336;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
          ">
            Выйти
          </button>
        </div>
      </div>
    </header>

    <!-- ===== МОДАЛЬНОЕ ОКНО ВХОДА ===== -->
    <div id="login-modal" style="
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    ">
      <div style="
        background: white;
        padding: 35px;
        border-radius: 16px;
        max-width: 400px;
        width: 90%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        position: relative;
      ">
        <button onclick="closeLoginModal()" style="
          position: absolute;
          top: 12px;
          right: 16px;
          background: none;
          border: none;
          font-size: 24px;
          cursor: pointer;
          color: #999;
        ">✕</button>
        
        <h2 style="margin: 0 0 8px 0; color: #1a2a6c;">🔐 Вход</h2>
        <p style="color: #666; margin-bottom: 20px;">Введите ваше имя и пароль (1234)</p>
        
        <div style="margin: 20px 0;">
          <select id="login-name" style="
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
            background: white;
          ">
            <option value="">Выберите имя</option>
          </select>
          
          <input type="password" id="login-password" placeholder="Введите пароль" style="
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
          ">
        </div>
        
        <button onclick="login()" style="
          background: #1a2a6c;
          color: #ffd900;
          border: none;
          padding: 12px 40px;
          border-radius: 8px;
          font-weight: 700;
          font-size: 16px;
          cursor: pointer;
          transition: opacity 0.2s;
          width: 100%;
        ">
          Войти
        </button>
        
        <p id="login-error" style="color: #f44336; margin-top: 12px; display: none; font-weight: 600;">❌ Неверное имя или пароль</p>
      </div>
    </div>

    <!-- ===== БЛОК ПРОГНОЗОВ ПОЛЬЗОВАТЕЛЯ ===== -->
    <div id="user-predictions-wrapper" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3 style="font-size: 1.4rem; font-weight: 700; color: #1a2a6c; margin: 0; padding: 0; border-bottom: 3px solid #ffd900; padding-bottom: 8px;">
          <span style="font-size: 1.5rem;">📋</span> Ваши прогнозы
        </h3>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <button onclick="showFinalBalance()" id="show-balance-btn" style="
            background: #1a2a6c;
            color: #ffd900;
            border: 2px solid #ffd900;
            padding: 6px 18px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
          ">
            🏆 Итоговый баланс
          </button>
          <button onclick="showFinance()" id="show-finance-btn" style="
            background: #1a2a6c;
            color: #ffd900;
            border: 2px solid #ffd900;
            padding: 6px 18px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
          ">
            💰 Финансы
          </button>
          <button onclick="showAllTables()" id="show-all-btn" style="
            background: #1a2a6c;
            color: #ffd900;
            border: 2px solid #ffd900;
            padding: 6px 18px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
          ">
            📊 Все таблицы
          </button>
        </div>
      </div>
      <div id="user-predictions" style="
        background: white;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        margin-bottom: 30px;
        overflow-x: auto;
        min-height: 60px;
      ">
        <p style="color: #999; text-align: center;">👤 Войдите, чтобы увидеть свои прогнозы</p>
      </div>
    </div>

    <!-- ===== БЛОК ИТОГОВОГО БАЛАНСА ===== -->
    <div id="final-balance-wrapper" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3 style="font-size: 1.4rem; font-weight: 700; color: #1a2a6c; margin: 0; padding: 0; border-bottom: 3px solid #ffd900; padding-bottom: 8px;">
          <span style="font-size: 1.5rem;">🏆</span> Итоговый баланс
        </h3>
        <button onclick="closeFinalBalance()" style="
          background: #f44336;
          color: white;
          border: none;
          padding: 6px 16px;
          border-radius: 6px;
          cursor: pointer;
          font-weight: 600;
          font-size: 13px;
        ">
          ✕ Закрыть
        </button>
      </div>
      <div id="final-results" style="margin-bottom: 30px;"></div>
    </div>

    <!-- ===== БЛОК ФИНАНСОВ ===== -->
    <div id="finance-wrapper" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3 style="font-size: 1.4rem; font-weight: 700; color: #1a2a6c; margin: 0; padding: 0; border-bottom: 3px solid #ffd900; padding-bottom: 8px;">
          <span style="font-size: 1.5rem;">💰</span> Финансы: кто сколько заработал
        </h3>
        <button onclick="closeFinance()" style="
          background: #f44336;
          color: white;
          border: none;
          padding: 6px 16px;
          border-radius: 6px;
          cursor: pointer;
          font-weight: 600;
          font-size: 13px;
        ">
          ✕ Закрыть
        </button>
      </div>
      <div id="money-container" style="margin-bottom: 30px;"></div>
    </div>

    <!-- ===== ВСЕ ОБЩИЕ ТАБЛИЦЫ (без Финансов и Баланса) ===== -->
    <div id="all-tables">
      <!-- Таблица прогнозов -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3 style="font-size: 1.4rem; font-weight: 700; color: #1a2a6c; margin: 0; padding: 0; border-bottom: 3px solid #ffd900; padding-bottom: 8px;">
          <span style="font-size: 1.5rem;">📊</span> Таблица прогнозов (все участники)
        </h3>
        <button onclick="showMyPredictions()" id="back-to-my-btn" style="
          background: #1a2a6c;
          color: #ffd900;
          border: 2px solid #ffd900;
          padding: 6px 18px;
          border-radius: 6px;
          font-weight: 700;
          font-size: 13px;
          cursor: pointer;
          transition: all 0.2s;
          display: none;
          white-space: nowrap;
          margin-left: 16px;
        ">
          🔙 Мои прогнозы
        </button>
      </div>
      <div class="predictions-table-wrapper">
        <table id="predictions-table"></table>
        <div id="cellTooltip" class="cell-tooltip"></div>
      </div>

      <!-- Турнирная таблица -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0 16px 0;">
        <h3 style="font-size: 1.4rem; font-weight: 700; color: #1a2a6c; margin: 0; padding: 0; border-bottom: 3px solid #ffd900; padding-bottom: 8px;">
          <span style="font-size: 1.5rem;">📊</span> Турнирная таблица (очки)
        </h3>
      </div>
      <div id="scores-container"></div>
    </div>
    
  </div>

  <script src="data/loader.js"></script>
  <script src="script.js"></script>
</body>

</html>
